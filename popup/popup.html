    <!-- 设置面板 -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-header">
            <h3>设置</h3>
            <button id="closeSettingsBtn" class="close-btn">✕</button>
        </div>

        <div class="settings-content">
            <!-- AI 配置 -->
            <section class="settings-section">
                <div class="form-group">
                    <label class="toggle-label">
                        <span class="toggle-text">启用 AI 智能推荐</span>
                        <input type="checkbox" id="aiEnabled" class="toggle-input">
                    </label>
                    <p class="help-text">关闭后 AI 按钮将隐藏，搜索框仅支持关键词搜索</p>
                </div>

                <div class="form-group ai-config">
                    <label for="provider">AI 提供商:</label>
                    <select id="provider" class="select">
                        <option value="gemini">Google Gemini (推荐)</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic Claude</option>
                        <option value="ollama">Ollama (本地)</option>
                        <option value="baidu">百度文心一言</option>
                        <option value="glm">智谱GLM</option>
                        <option value="qwen">阿里通义千问</option>
                        <option value="deepseek">DeepSeek</option>
                    </select>
                </div>

                <div class="form-group ai-config">
                    <label for="apiKey">API Key:</label>
                    <div class="input-group">
                        <input type="password" id="apiKey" class="input" placeholder="输入你的 API Key">
                        <button id="toggleApiKeyBtn" class="icon-button" title="显示/隐藏">👁</button>
                    </div>
                    <p class="help-text" id="providerHelp"></p>
                </div>

                <div class="form-group ai-config">
                    <label for="model">模型选择:</label>
                    <select id="model" class="select">
                        <!-- 动态生成 -->
                    </select>
                </div>

                <div class="form-group ai-config">
                    <label for="apiKey">系统提示词:</label>
                    <textarea id="systemPrompt" class="textarea" placeholder="输入系统提示词" rows="4"></textarea>
                    <button id="resetPromptBtn" class="button-link">恢复默认</button>
                </div>
            </section>

            <!-- 主题 -->
            <section class="settings-section">
                <div class="form-group">
                    <label for="theme"><i class="fa-solid fa-puzzle-piece-simple"></i>主题:</label>
                    <select id="theme" class="select">
                        <option value="system">跟随系统</option>
                        <option value="light">浅色</option>
                        <option value="dark">深色</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sortBy">排序方式:</label>
                    <select id="sortBy" class="select">
                        <option value="dateAdded">按添加时间</option>
                        <option value="dateLastUsed">按上次使用时间</option>
                    </select>
                    <p class="help-text">按上次使用时间排序时，若无使用记录则使用添加时间</p>
                </div>
            </section>
        </div>

        <div class="settings-footer">
            <button id="resetBtn" class="button-secondary">恢复默认</button>
            <button id="saveBtn" class="button-primary">保存设置</button>
        </div>
    </div>

    <script src="../js/storage.js"></script>
    <script src="../js/bookmarks.js"></script>
    <script src="../js/api.js"></script>
    <script src="popup.js"></script>
</body>

</html>
